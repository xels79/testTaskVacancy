services:
  node_server:
    # image: node:24-alpine
    build: ./Dockerfile_node
    user: "node"
    working_dir: /home/node/app
    environment:
      - NODE_ENV=production
    volumes:
      - ./server:/home/node/app
    ports:
      - "3000:3000"
    command: ["npm", "start"]
  # node_client:
  #   # image: node:24-alpine
  #   build: ./Dockerfile_node
  #   user: "node"
