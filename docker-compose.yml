  #   volumes:
  #     - ./client:/home/node/app
  #   ports:
  #     - "5173:5173"
  #   command: ["npm", "run", "build"]
  #   depends_on:
  #     - node_server
  apache:
    build: .
    container_name: my-apache-app
    ports:
      - '8080:80'
    volumes:
      - ./client/dist:/usr/local/apache2/htdocs
    depends_on:
      - node_server
      # - node_client